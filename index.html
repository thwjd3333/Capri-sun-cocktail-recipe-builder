<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 냉장고에 뭐 있어? — Capri-Sun Zero</title>
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --card: #161616;
    --border: #242424;
    --orange: #FF5500;
    --amber: #FFB800;
    --frost: #F0EDE6;
    --muted: #555555;
    --dim: #333333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--frost);
    font-family: Arial, "Apple SD Gothic Neo", sans-serif;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .wrap { max-width: 480px; margin: 0 auto; padding: 32px 24px 60px; }

  .eyebrow {
    font-size: 10px; font-weight: 800; letter-spacing: 3px;
    color: var(--orange); text-transform: uppercase; margin-bottom: 8px;
  }
  h1 {
    font-size: 30px; font-weight: 900; letter-spacing: -1.2px; line-height: 1.15;
  }
  h1 span { color: var(--orange); }
  .sub {
    color: var(--muted); font-size: 13px; margin-top: 10px; line-height: 1.65;
  }

  .glass-zone { display: flex; justify-content: center; padding: 28px 0 8px; }
  .glass-box { position: relative; }
  .glass-count {
    position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 3px 10px; font-size: 11px; color: var(--muted); white-space: nowrap;
    opacity: 0; transition: opacity 0.2s;
  }
  .glass-count.show { opacity: 1; }

  .cat-block { margin-bottom: 24px; }
  .cat-label {
    font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    cursor: pointer; border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 14px; font-size: 13px; font-weight: 600; transition: all 0.15s;
    background: var(--surface); color: #888; display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { border-color: #333; color: #ccc; }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; display: none; }
  .chip.on .dot { display: inline-block; }

  .base-badge {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
  }
  .base-badge .title { font-size: 13px; font-weight: 800; color: var(--frost); }
  .base-badge .spec { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .btn-main {
    width: 100%; padding: 18px; background: var(--orange); color: #fff; border: none;
    border-radius: 14px; font-size: 17px; font-weight: 900; cursor: pointer;
    letter-spacing: -0.3px; transition: opacity 0.15s, transform 0.1s; margin-bottom: 32px;
  }
  .btn-main:hover { opacity: 0.9; }
  .btn-main:active { transform: scale(0.98); }
  .btn-main:disabled { background: #1A1A1A; color: #333; cursor: default; }

  .dot-loader span {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #fff; margin: 0 3px -1px; animation: pulse 1.2s ease-in-out infinite;
  }
  .dot-loader span:nth-child(2) { animation-delay: 0.15s; }
  .dot-loader span:nth-child(3) { animation-delay: 0.3s; }

  .error-msg { color: #FF5555; font-size: 13px; text-align: center; margin-bottom: 20px; display: none; }

  .result-card { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; margin-bottom: 40px; display: none; }

  .result-head {
    background: var(--card); border-radius: 18px 18px 0 0; border: 1px solid var(--border);
    border-bottom: none; padding: 28px 24px 22px;
  }
  .result-head .eyebrow { margin-bottom: 10px; }
  .result-head h2 { font-size: 28px; font-weight: 900; letter-spacing: -1px; color: var(--frost); margin-bottom: 8px; }
  .result-head .tagline { font-size: 14px; color: var(--muted); font-style: italic; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .tag {
    border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 700; border: 1px solid;
  }

  .steps-block {
    background: var(--surface); border: 1px solid var(--border); border-top: none; padding: 22px 24px;
  }
  .steps-label {
    font-size: 10px; font-weight: 800; letter-spacing: 2.5px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 14px;
  }
  .step-row { display: flex; gap: 14px; margin-bottom: 14px; }
  .step-row:last-child { margin-bottom: 0; }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%; background: var(--orange); color: #fff;
    font-size: 11px; font-weight: 900; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .step-text { font-size: 14px; color: #ccc; line-height: 1.65; padding-top: 3px; }

  .foot-block {
    background: var(--card); border: 1px solid var(--border); border-top: none;
    padding: 22px 24px; border-radius: 0 0 18px 18px;
  }
  .info-box {
    display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
    background: #0D0D0D; border-radius: 10px; margin-bottom: 14px;
  }
  .info-box.zero {
    background: rgba(255,85,0,0.06); border: 1px solid rgba(255,85,0,0.2);
  }
  .info-box .icon { font-size: 18px; }
  .info-box .label {
    font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .info-box.zero .label { color: var(--orange); }
  .info-box p { font-size: 13px; color: #ccc; line-height: 1.6; }

  .btn-retry {
    width: 100%; margin-top: 16px; padding: 14px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-retry:hover { border-color: var(--orange); color: var(--orange); }

  .key-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 16px;
  }
  .key-label { font-size: 12px; font-weight: 800; color: var(--frost); margin-bottom: 8px; }
  .key-input {
    width: 100%; padding: 10px 12px; background: #0D0D0D; border: 1px solid var(--border);
    border-radius: 8px; color: var(--frost); font-size: 13px; margin-bottom: 8px;
  }
  .key-input:focus { outline: none; border-color: var(--orange); }
  .key-save {
    width: 100%; padding: 10px; background: var(--orange); color: #fff; border: none;
    border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 8px;
  }
  .key-hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .key-hint a { color: var(--orange); text-decoration: none; }
  .key-saved {
    background: rgba(255,85,0,0.06); border: 1px solid rgba(255,85,0,0.2); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  .key-saved button {
    background: none; border: none; color: var(--orange); font-size: 12px; font-weight: 700;
    cursor: pointer; text-decoration: underline;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Capri-Sun Zero</div>
  <h1>오늘 냉장고에<br><span>뭐 있어?</span></h1>
  <p class="sub">재료 골라봐 — 카프리썬 제로 베이스로<br>AI가 바로 레시피 만들어줄게.</p>

  <div class="glass-zone">
    <div class="glass-box">
      <svg id="glassSvg" width="90" height="160" viewBox="0 0 90 160"></svg>
      <div class="glass-count" id="glassCount">0가지 재료</div>
    </div>
  </div>

  <div id="catContainer"></div>

  <div class="base-badge">
    <svg width="36" height="52" viewBox="0 0 36 52">
      <path d="M7,4 Q7,2 10,2 L26,2 Q29,2 29,4 L32,38 Q33,46 18,50 Q3,46 4,38 Z" fill="#FF5500" opacity="0.9"/>
      <text x="18" y="29" text-anchor="middle" fill="white" font-size="7" font-weight="900" font-family="Arial Black, Arial">ZERO</text>
      <rect x="15" y="-4" width="6" height="9" rx="3" fill="#FFB800"/>
    </svg>
    <div>
      <div class="title">카프리썬 제로 오렌지 — 항상 베이스</div>
      <div class="spec">0 kcal · 당 0g · 어떤 재료와 섞어도 부담 없어</div>
    </div>
  </div>

  <button class="btn-main" id="buildBtn" disabled>재료를 골라줘</button>
  <div class="error-msg" id="errorMsg">레시피 생성에 실패했어. 다시 시도해봐.</div>

  <div class="result-card" id="resultCard">
    <div class="result-head">
      <div class="eyebrow">AI 추천 레시피</div>
      <h2 id="rName"></h2>
      <p class="tagline" id="rTagline"></p>
      <div class="tag-row" id="rTags"></div>
    </div>
    <div class="steps-block">
      <div class="steps-label">만드는 법</div>
      <div id="rSteps"></div>
    </div>
    <div class="foot-block">
      <div class="info-box">
        <span class="icon">👅</span>
        <div>
          <div class="label">맛 프로파일</div>
          <p id="rTaste"></p>
        </div>
      </div>
      <div class="info-box zero">
        <span class="icon">🍊</span>
        <div>
          <div class="label">제로이기 때문에</div>
          <p id="rZeroPoint"></p>
        </div>
      </div>
      <button class="btn-retry" id="retryBtn">같은 재료로 다른 레시피 →</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const CATEGORIES = [
  { label: "주류", emoji: "🥃", items: ["소주","보드카","럼","진","스파클링 와인","맥주"],
    colors: ["#C2185B","#5C6BC0","#795548","#388E3C","#F9A825","#FFA000"] },
  { label: "과일·허브", emoji: "🍋", items: ["레몬","라임","오렌지","민트","생강"],
    colors: ["#FDD835","#8BC34A","#FF7043","#43A047","#EF6C00"] },
  { label: "음료", emoji: "🫧", items: ["탄산수","토닉워터","콜라","우유"],
    colors: ["#4FC3F7","#80DEEA","#5D4037","#ECEFF1"] },
  { label: "기타", emoji: "✨", items: ["얼음","설탕 시럽","소금"],
    colors: ["#B3E5FC","#FFD54F","#CFD8DC"] },
];
const ITEM_COLOR = {};
CATEGORIES.forEach(cat => cat.items.forEach((item,i) => ITEM_COLOR[item] = cat.colors[i]));

let selected = [];

// ── RENDER CATEGORY CHIPS ────────────────────────────────────────────────
const catContainer = document.getElementById('catContainer');
CATEGORIES.forEach(cat => {
  const block = document.createElement('div');
  block.className = 'cat-block';
  const label = document.createElement('div');
  label.className = 'cat-label';
  label.textContent = `${cat.emoji} ${cat.label}`;
  block.appendChild(label);

  const row = document.createElement('div');
  row.className = 'chip-row';

  cat.items.forEach((item, i) => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.dataset.item = item;
    chip.dataset.color = cat.colors[i];
    chip.innerHTML = `<span class="dot" style="background:${cat.colors[i]}"></span>${item}`;
    chip.onclick = () => toggleItem(item, chip);
    row.appendChild(chip);
  });

  block.appendChild(row);
  catContainer.appendChild(block);
});

function toggleItem(item, chipEl) {
  const idx = selected.indexOf(item);
  if (idx >= 0) {
    selected.splice(idx, 1);
    chipEl.classList.remove('on');
    chipEl.style.background = '';
    chipEl.style.borderColor = '';
    chipEl.style.color = '';
  } else {
    selected.push(item);
    chipEl.classList.add('on');
    const c = chipEl.dataset.color;
    chipEl.style.background = c + '22';
    chipEl.style.borderColor = c;
    chipEl.style.color = c;
  }
  updateGlass();
  updateButton();
  hideResult();
}

function updateButton() {
  const btn = document.getElementById('buildBtn');
  btn.disabled = selected.length === 0;
  btn.textContent = selected.length === 0 ? '재료를 골라줘' : '레시피 만들기 →';
}

function hideResult() {
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
}

// ── GLASS VISUALIZER ──────────────────────────────────────────────────────
function updateGlass() {
  const svg = document.getElementById('glassSvg');
  const W = 90, H = 160;
  const colors = selected.slice(0,6).map(s => ITEM_COLOR[s] || '#FF5500');
  const filled = Math.min(selected.length / 5, 1);

  let layersHTML = '';
  if (colors.length > 0) {
    const layerH = (H * 0.76 * filled) / colors.length;
    colors.forEach((c, i) => {
      const y = H*0.12 + (H*0.76)*(1-filled) + layerH*i;
      layersHTML += `<rect x="0" y="${y}" width="${W}" height="${layerH+2}" fill="${c}" opacity="0.82" clip-path="url(#glassClip)" style="transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)"/>`;
    });
  }

  const glassPath = `M${W*0.18},${H*0.08} L${W*0.12},${H*0.92} Q${W*0.12},${H*0.98} ${W*0.5},${H*0.98} Q${W*0.88},${H*0.98} ${W*0.88},${H*0.92} L${W*0.82},${H*0.08} Z`;

  svg.innerHTML = `
    <defs>
      <clipPath id="glassClip"><path d="${glassPath}"/></clipPath>
      <linearGradient id="glassShine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
        <stop offset="40%" stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
      </linearGradient>
    </defs>
    <path d="${glassPath}" fill="none" stroke="#2A2A2A" stroke-width="1.5"/>
    ${layersHTML}
    <path d="${glassPath}" fill="url(#glassShine)"/>
    <line x1="${W*0.18}" y1="${H*0.08}" x2="${W*0.82}" y2="${H*0.08}" stroke="#333" stroke-width="1"/>
    <g transform="translate(${W*0.62},${H*0.03}) scale(0.38)">
      <path d="M8,4 Q8,2 11,2 L27,2 Q30,2 30,4 L33,34 Q34,42 20,46 Q6,42 7,34 Z" fill="#FF5500" opacity="0.9"/>
      <text x="20" y="27" text-anchor="middle" fill="white" font-size="8" font-weight="900" font-family="Arial Black, Arial">ZERO</text>
      <rect x="17" y="-6" width="6" height="10" rx="3" fill="#FFB800"/>
    </g>
    ${selected.length === 0 ? `<text x="${W/2}" y="${H*0.62}" text-anchor="middle" fill="#2A2A2A" font-size="11" font-family="Arial">재료를 골라줘</text>` : ''}
  `;

  const countEl = document.getElementById('glassCount');
  if (selected.length > 0) {
    countEl.textContent = `${selected.length}가지 재료`;
    countEl.classList.add('show');
  } else {
    countEl.classList.remove('show');
  }
}
updateGlass();

// ── MOCK RECIPE ENGINE (API 호출 없이 로컬에서 즉석 생성) ──────────────────
const NAME_PARTS = {
  "소주": { adj: ["K-", "단단한", "솔직한"], noun: ["하이볼", "소다", "스플래시"] },
  "보드카": { adj: ["클린", "투명한", "차가운"], noun: ["오렌지", "선라이즈", "브리즈"] },
  "럼": { adj: ["트로피컬", "다크", "스모키"], noun: ["펀치", "선셋", "스월"] },
  "진": { adj: ["보태니컬", "드라이", "허벌"], noun: ["피즈", "토닉", "가든"] },
  "스파클링 와인": { adj: ["미니", "버블", "스파클"], noun: ["상그리아", "미모사", "프로젝트"] },
  "맥주": { adj: ["라들러", "쿨", "라이트"], noun: ["샨디", "쿨러", "스플래시"] },
  "레몬": { adj: ["새콤한", "옐로우"], noun: ["스퀴즈", "트위스트"] },
  "라임": { adj: ["그린", "산뜻한"], noun: ["라임에이드", "스퀴즈"] },
  "오렌지": { adj: ["오렌지", "선샤인"], noun: ["선라이즈", "에이드"] },
  "민트": { adj: ["민트", "쿨"], noun: ["모히토", "프레시"] },
  "생강": { adj: ["진저", "스파이시"], noun: ["뮬", "징거"] },
  "탄산수": { adj: ["스파클링", "버블"], noun: ["피즈", "스플래시"] },
  "토닉워터": { adj: ["토닉", "비터"], noun: ["토닉", "피즈"] },
  "콜라": { adj: ["다크", "클래식"], noun: ["하이볼", "콕"] },
  "우유": { adj: ["크리미", "밀키"], noun: ["크림", "라떼"] },
};

const TASTE_PARTS = {
  "소주": "은은한 곡물향에 부드러운 목넘김",
  "보드카": "깔끔하고 클린한 베이스",
  "럼": "달콤하고 묵직한 풍미",
  "진": "허브향이 살아있는 드라이한 끝맛",
  "스파클링 와인": "톡 쏘는 탄산과 가벼운 산미",
  "맥주": "청량한 홉 향과 가벼운 쓴맛",
  "레몬": "상큼한 산미",
  "라임": "산뜻하고 깔끔한 신맛",
  "오렌지": "달콤하고 과즙 가득한 풍미",
  "민트": "시원하고 청량한 여운",
  "생강": "알싸하고 스파이시한 킥",
  "탄산수": "가벼운 탄산감",
  "토닉워터": "은은한 쌉싸름함",
  "콜라": "달콤하고 묵직한 단맛",
  "우유": "부드럽고 크리미한 질감",
};

const STEP_TEMPLATES = {
  base: "잔에 얼음을 채우고 카프리썬 제로 오렌지를 통째로 붓는다.",
  add: (item) => `${item}을(를) 적당량 넣고 가볍게 저어준다.`,
  garnish: (item) => `${item}으로 가니쉬해 마무리한다.`,
  shake: "셰이커에 모든 재료를 넣고 10초간 흔든 뒤 잔에 따른다.",
  build: "잔에 직접 재료를 순서대로 부어 층을 살린다.",
  finish: "마지막에 가볍게 스월(swirl)해 향을 끌어올린다.",
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateMockRecipe(selected, hasAlcohol) {
  // Name
  const keyItem = selected.find(i => NAME_PARTS[i]) || selected[0];
  const parts = NAME_PARTS[keyItem] || { adj: ["시그니처"], noun: ["스페셜"] };
  const name = `${pick(parts.adj)} 제로 ${pick(parts.noun)}`;

  // Tagline
  const taglines = hasAlcohol
    ? ["당은 없고 분위기는 있는 한 잔", "가볍게 시작해서 끝까지 가벼운 맛", "오늘 하루 수고한 너에게 주는 잔"]
    : ["술 없이도 분위기는 완벽한 한 잔", "청량함만 남기고 부담은 뺀 음료", "낮이든 밤이든 부담 없는 선택"];
  const tagline = pick(taglines);

  // Steps
  const others = selected.filter(i => i !== keyItem);
  const steps = [STEP_TEMPLATES.base];
  if (others.length > 0) {
    steps.push(STEP_TEMPLATES.add(others.slice(0, 2).join(", ")));
  } else if (keyItem) {
    steps.push(STEP_TEMPLATES.add(keyItem));
  }
  if (others.length > 2) {
    steps.push(STEP_TEMPLATES.garnish(others[2]));
  } else {
    steps.push(pick([STEP_TEMPLATES.finish, STEP_TEMPLATES.build]));
  }

  // Taste
  const tasteWords = selected.map(i => TASTE_PARTS[i]).filter(Boolean).slice(0, 2);
  const taste = tasteWords.length > 0
    ? tasteWords.join("에 ") + ", 카프리썬 제로의 가벼운 단맛이 전체를 감싼다."
    : "산뜻하고 가벼운, 부담 없는 한 잔.";

  // Zero point
  const zeroPoints = hasAlcohol
    ? [
        "베이스가 0kcal·당 0g이라 알코올 칼로리만 남는, 가장 가벼운 칵테일.",
        "당분 걱정 없이 술의 풍미만 온전히 즐길 수 있는 구조.",
        "달아도 당은 없는 — 카프리썬 제로라서 가능한 조합.",
      ]
    : [
        "처음부터 끝까지 0kcal·당 0g, 부담 없이 몇 잔이든 괜찮은 음료.",
        "칼로리 걱정 없이 청량함만 즐기는 가장 클린한 선택.",
        "술 없이도 분위기를 채우는, 죄책감 없는 한 잔.",
      ];
  const zeroPoint = pick(zeroPoints);

  return { name, tagline, steps, taste, zeroPoint, isAlcohol: hasAlcohol };
}

async function build() {
  if (selected.length === 0) return;
  const btn = document.getElementById('buildBtn');
  const errorMsg = document.getElementById('errorMsg');
  hideResult();
  btn.disabled = true;
  btn.innerHTML = `레시피 만드는 중 <span class="dot-loader"><span></span><span></span><span></span></span>`;

  const hasAlcohol = CATEGORIES[0].items.some(a => selected.includes(a));

  try {
    // 실제 시연감을 위한 짧은 인위적 지연 (API 호출 없이 로컬에서 즉석 생성)
    await new Promise((resolve) => setTimeout(resolve, 900 + Math.random() * 500));
    const result = generateMockRecipe(selected, hasAlcohol);
    renderResult(result);
  } catch (e) {
    errorMsg.style.display = 'block';
  }

  updateButton();
}

function renderResult(result) {
  document.getElementById('rName').textContent = result.name;
  document.getElementById('rTagline').textContent = result.tagline;

  const tagRow = document.getElementById('rTags');
  tagRow.innerHTML = '';
  selected.forEach(s => {
    const c = ITEM_COLOR[s] || '#FF5500';
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.style.background = c + '18';
    tag.style.borderColor = c + '44';
    tag.style.color = c;
    tag.textContent = s;
    tagRow.appendChild(tag);
  });
  const baseTag = document.createElement('span');
  baseTag.className = 'tag';
  baseTag.style.background = '#FF550018';
  baseTag.style.borderColor = '#FF550044';
  baseTag.style.color = '#FF5500';
  baseTag.textContent = '카프리썬 제로 ✦';
  tagRow.appendChild(baseTag);

  const stepsEl = document.getElementById('rSteps');
  stepsEl.innerHTML = '';
  result.steps.forEach((step, i) => {
    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `<div class="step-num">${i+1}</div><p class="step-text">${step}</p>`;
    stepsEl.appendChild(row);
  });

  document.getElementById('rTaste').textContent = result.taste;
  document.getElementById('rZeroPoint').textContent = result.zeroPoint;

  const card = document.getElementById('resultCard');
  card.style.display = 'block';
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

document.getElementById('buildBtn').addEventListener('click', build);
document.getElementById('retryBtn').addEventListener('click', build);
</script>
